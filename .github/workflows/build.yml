name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias wxhook -keyalg RSA -keysize 2048 -validity 10000 -storepass wxhook123 -keypass wxhook123 -dname "CN=wxhook,OU=dev,O=wxhook,L=beijing,ST=beijing,C=cn"
      
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wxhook-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Xposed APK
        uses: actions/upload-artifact@v4
        with:
          name: wxhook-xposed-debug
          path: xposed/build/outputs/apk/debug/xposed-debug.apk
