name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download pre-built rclone
        run: |
          mkdir -p app/src/main/assets/bin
          # rclone v1.69.2 pre-built for android arm64
          curl -sL "https://github.com/rclone/rclone/releases/download/v1.69.2/rclone-v1.69.2-android-arm64.zip" -o /tmp/rclone.zip
          file /tmp/rclone.zip
          if ! unzip -j /tmp/rclone.zip "*/rclone" -d app/src/main/assets/bin/ 2>/dev/null; then
            # Fallback: download raw binary from rclone build
            curl -sL "https://downloads.rclone.org/v1.69.2/rclone-v1.69.2-linux-arm64.zip" -o /tmp/rclone_linux.zip
            unzip -j /tmp/rclone_linux.zip "*/rclone" -d app/src/main/assets/bin/
          fi
          if [ ! -f app/src/main/assets/bin/rclone ]; then
            # Last resort: use the already-committed binary in repo
            cp app/src/main/assets/bin/rclone app/src/main/assets/bin/rclone 2>/dev/null || true
          fi
          chmod +x app/src/main/assets/bin/rclone 2>/dev/null || true
          ls -lh app/src/main/assets/bin/rclone || echo "rclone binary MISSING"

      - name: Download pre-built zstd
        run: |
          # zstd 1.5.6 android arm64 binary from official release
          curl -sL "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6-android-arm64.zip" -o /tmp/zstd.zip || \
            curl -sL "https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6-linux-aarch64.zip" -o /tmp/zstd.zip
          if [ -f /tmp/zstd.zip ]; then
            unzip -o /tmp/zstd.zip -d /tmp/zstd_extract 2>/dev/null || true
            find /tmp/zstd_extract -name "zstd" -type f -exec cp {} app/src/main/assets/bin/zstd \;
          fi
          # Fallback: compile from source (fast, zstd is small)
          if [ ! -f app/src/main/assets/bin/zstd ]; then
            cd /tmp && curl -sL https://github.com/facebook/zstd/releases/download/v1.5.6/zstd-1.5.6.tar.gz | tar xz
            cd zstd-1.5.6 && make zstd-release -j$(nproc) CC=aarch64-linux-gnu-gcc 2>/dev/null || CC="gcc -march=armv8-a" make zstd-release -j$(nproc)
            cp programs/zstd $GITHUB_WORKSPACE/app/src/main/assets/bin/zstd
          fi
          chmod +x app/src/main/assets/bin/zstd
          ls -lh app/src/main/assets/bin/zstd

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wxhook-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Xposed APK
        uses: actions/upload-artifact@v4
        with:
          name: wxhook-xposed-debug
          path: xposed/build/outputs/apk/debug/xposed-debug.apk

      - name: Publish to Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: "wxhook nightly build"
          artifacts: "app/build/outputs/apk/debug/app-debug.apk,xposed/build/outputs/apk/debug/xposed-debug.apk"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          removeArtifacts: true
          body: "自动构建 ${{ github.run_number }} - ${{ github.sha }}"
